version: '3.9'

services:
  # ─────────────────────────────
  # Backend API
  # ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
      target: production
    container_name: pipeline-intelligence-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pipeline-net

  # ─────────────────────────────
  # Frontend (Vite dev server)
  # ─────────────────────────────
  frontend:
    image: node:18-alpine
    container_name: pipeline-intelligence-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pipeline-net

networks:
  pipeline-net:
    driver: bridge
